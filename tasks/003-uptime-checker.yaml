id: "003"
title: "uptime-checker"
type: "feature"
risk: "medium"
depends_on:
  - "002"
context_files:
  - "src/monitor/uptime_checker.py"
  - "src/monitor/config_loader.py"
done_when:
  - "Create src/monitor/uptime_checker.py"
  - "Import requests library"
  - "Define a function exactly named 'check_uptime' that takes a url string and a timeout integer (default 10)"
  - "The function must make a GET request to the url and return a dictionary with keys: url, status_code, response_time_ms, is_up, checked_at, error"
  - "If the request succeeds (status 200-399), is_up must be True"
  - "If the request fails (timeout, connection error, status 400+), is_up must be False and error must contain the error message"
  - "response_time_ms must be the elapsed time in milliseconds as a float rounded to 2 decimal places"
  - "checked_at must be an ISO 8601 timestamp string"
  - "Define a function exactly named 'check_all_sites' that takes a list of site dictionaries, calls check_uptime for each, and returns a list of result dictionaries"
  - "Add a if __name__ == '__main__' block that loads sites from config and checks all of them, printing results as JSON"
validate:
  - "python3 -m py_compile src/monitor/uptime_checker.py"
  - "grep 'def check_uptime' src/monitor/uptime_checker.py"
  - "grep 'def check_all_sites' src/monitor/uptime_checker.py"
  - "grep 'response_time_ms' src/monitor/uptime_checker.py"
  - "grep 'is_up' src/monitor/uptime_checker.py"
  - "grep 'checked_at' src/monitor/uptime_checker.py"
  - "grep 'import requests' src/monitor/uptime_checker.py"
status: "pending"
