id: "007"
title: "report-generator"
type: "feature"
risk: "medium"
depends_on:
  - "003"
  - "004"
  - "005"
context_files:
  - "src/reports/report_generator.py"
done_when:
  - "Create src/reports/report_generator.py"
  - "Define a function exactly named 'generate_report' that takes uptime_results (list), ssl_results (list), speed_results (list), and report_date (string)"
  - "The function must return a dictionary with keys: report_date, generated_at, summary, sites"
  - "summary must contain: total_sites, sites_up, sites_down, avg_response_time_ms, ssl_issues_count"
  - "Each entry in sites must contain: name, uptime_status, response_time_ms, ssl_days_remaining, page_size_bytes"
  - "Define a function exactly named 'render_report_text' that takes a report dictionary and returns a formatted plain-text report string"
  - "The text report must include a header with the report date, a summary section, and a per-site details section"
  - "Define a function exactly named 'save_report' that takes a report dictionary and an output_dir path, and saves the report as both JSON and plain text files"
  - "The JSON file must be named report_YYYY-MM-DD.json"
  - "The text file must be named report_YYYY-MM-DD.txt"
  - "Add a if __name__ == '__main__' block that generates a sample report with dummy data and saves it to a reports_output directory"
validate:
  - "python3 -m py_compile src/reports/report_generator.py"
  - "grep 'def generate_report' src/reports/report_generator.py"
  - "grep 'def render_report_text' src/reports/report_generator.py"
  - "grep 'def save_report' src/reports/report_generator.py"
  - "grep 'total_sites' src/reports/report_generator.py"
  - "grep 'sites_up' src/reports/report_generator.py"
  - "grep 'report_YYYY-MM-DD' src/reports/report_generator.py"
status: "pending"
